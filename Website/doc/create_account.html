<!DOCTYPE html>
<html lang="en">
<head>
    <title>Create Account - Vinnity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>
<body class="bg-gradient-to-b from-blue-500 to-blue-900 min-h-screen flex flex-col">
    <nav class="bg-gray-900 text-white p-4 flex justify-between items-center">
        <div class="text-lg font-bold">Vinnity</div>
        <div class="space-x-4">
            <a href="home.html" class="hover:underline">Home</a>
            <a href="about.html" class="hover:underline">About</a>
            <a href="download.html" class="hover:underline">Download</a>
            <a href="../login.html" class="bg-blue-600 hover:bg-blue-700 text-white py-2 px-4 rounded">Login</a>
        </div>
    </nav>
    <div class="flex-grow flex flex-col justify-center items-center text-center text-white">
        <h1 class="text-3xl md:text-5xl font-bold mb-4">Create Your Account</h1>
        <form class="bg-gray-800 p-6 rounded shadow-md w-80">
            <div class="mb-4">
                <label for="username" class="block text-sm mb-1">Username</label>
                <input type="text" id="username" name="username" required class="w-full p-2 rounded bg-gray-700 text-white focus:outline-none focus:ring-2 focus:ring-blue-600" placeholder="Choose a username">
            </div>
            <div class="mb-4">
                <label for="email" class="block text-sm mb-1">Email</label>
                <input type="email" id="email" name="email" required class="w-full p-2 rounded bg-gray-700 text-white focus:outline-none focus:ring-2 focus:ring-blue-600" placeholder="Enter your email">
            </div>
            <div class="mb-4">
                <label for="password" class="block text-sm mb-1">Password</label>
                <input type="password" id="password" name="password" required class="w-full p-2 rounded bg-gray-700 text-white focus:outline-none focus:ring-2 focus:ring-blue-600" placeholder="Create a password">
            </div>
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white py-2 px-4 rounded w-full">Create Account</button>
        </form>
        <p class="mt-4 text-sm">
            Already have an account? <a href="../login.html" class="text-blue-400 hover:underline">Login here</a>.
        </p>
        <div class="space-x-4 mt-8">
            <a href="about.html" class="bg-gray-600 hover:bg-gray-700 text-white py-2 px-4 rounded">Back to About</a>
            <a href="home.html" class="bg-gray-600 hover:bg-gray-700 text-white py-2 px-4 rounded">Back to Home</a>
        </div>
    </div>
</body>
</html>
