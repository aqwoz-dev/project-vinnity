<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Vinnity</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-800 text-white flex flex-col min-h-screen">
    <nav class="bg-gray-900 p-4 flex justify-between items-center">
        <div class="text-lg font-bold">Vinnity</div>
        <div class="space-x-4">
            <a href="home.html" class="hover:underline">Home</a>
            <a href="about.html" class="hover:underline">About</a>
            <a href="download.html" class="hover:underline">Download</a>
            <a href="create_account.html" class="bg-blue-600 hover:bg-blue-700 text-white py-2 px-4 rounded">Create Account</a>
        </div>
    </nav>
    <div class="flex-grow flex flex-col justify-center items-center text-center">
        <h1 class="text-3xl md:text-5xl font-bold mb-4">Login to Vinnity</h1>
        <form class="bg-gray-700 p-6 rounded shadow-md w-80">
            <div class="mb-4">
                <label for="email" class="block text-sm mb-1">Email</label>
                <input type="email" id="email" name="email" required class="w-full p-2 rounded bg-gray-600 text-white focus:outline-none focus:ring-2 focus:ring-blue-600" placeholder="Enter your email">
            </div>
            <div class="mb-4">
                <label for="password" class="block text-sm mb-1">Password</label>
                <input type="password" id="password" name="password" required class="w-full p-2 rounded bg-gray-600 text-white focus:outline-none focus:ring-2 focus:ring-blue-600" placeholder="Enter your password">
            </div>
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white py-2 px-4 rounded w-full">Login</button>
        </form>
        <p class="mt-4 text-sm">
            Don't have an account? <a href="create_account.html" class="text-blue-400 hover:underline">Create one here</a>.
        </p>
    </div>
</body>
</html>
